name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libfontconfig1-dev \
            wget file curl

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build shuffle CLI
        run: cargo build --release -p shuffle

      - name: Build shuffle GUI
        run: cargo build --release -p shuffle_gui

      - name: Package tar.gz
        run: |
          mkdir -p dist
          cp target/release/shuffle     dist/shuffle-linux-x86_64
          cp target/release/shuffle_gui dist/shuffle_gui-linux-x86_64
          tar -czf shuffle-linux-x86_64.tar.gz -C dist .

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage appimagetool-x86_64.AppImage

          # Build AppDir skeleton
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp packaging/linux/deadpool.desktop \
            AppDir/usr/share/applications/deadpool.desktop
          cp shuffle_gui/resources/icon.png \
            AppDir/usr/share/icons/hicolor/256x256/apps/deadpool.png

          # Bundle both executables and their shared-library dependencies
          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable target/release/shuffle \
            --executable target/release/shuffle_gui \
            --desktop-file AppDir/usr/share/applications/deadpool.desktop \
            --icon-file shuffle_gui/resources/icon.png

          # linuxdeploy creates AppRun as a symlink; remove it before
          # installing our custom launcher (GUI by default, CLI with --cli)
          rm -f AppDir/AppRun
          install -m755 packaging/linux/AppRun AppDir/AppRun

          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage \
            AppDir "deadpool-${VERSION}-linux-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            shuffle-linux-x86_64.tar.gz
            deadpool-*-linux-x86_64.AppImage

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build shuffle CLI
        run: cargo build --release -p shuffle

      - name: Build shuffle GUI
        run: cargo build --release -p shuffle_gui

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target\release\shuffle.exe     dist\shuffle-windows-x86_64.exe
          Copy-Item target\release\shuffle_gui.exe dist\shuffle_gui-windows-x86_64.exe
          Compress-Archive -Path dist\* -DestinationPath shuffle-windows-x86_64.zip

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''

          # Convert the PNG icon to a multi-size ICO (ImageMagick is pre-installed)
          magick "shuffle_gui\resources\icon.png" `
            -define icon:auto-resize="256,128,64,48,32,16" icon.ico

          # Stage all installer inputs in one directory
          New-Item -ItemType Directory -Force installer_stage
          Copy-Item target\release\shuffle.exe     installer_stage\shuffle.exe
          Copy-Item target\release\shuffle_gui.exe installer_stage\shuffle_gui.exe
          Copy-Item icon.ico                        installer_stage\icon.ico
          Copy-Item packaging\windows\installer.iss installer_stage\installer.iss

          # Compile — output lands in workspace root
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=$version" "/O$env:GITHUB_WORKSPACE" `
            installer_stage\installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            shuffle-windows-x86_64.zip
            deadpool-windows-x86_64-installer.exe

  build-macos-universal:
    name: Build macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build shuffle CLI (arm64 + x86_64)
        run: |
          cargo build --release --target aarch64-apple-darwin -p shuffle
          cargo build --release --target x86_64-apple-darwin  -p shuffle

      - name: Create universal shuffle binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/shuffle \
            target/x86_64-apple-darwin/release/shuffle \
            -output shuffle-macos-universal

      - name: Build shuffle_gui (arm64 + x86_64)
        run: |
          cargo build --release --target aarch64-apple-darwin -p shuffle_gui
          cargo build --release --target x86_64-apple-darwin  -p shuffle_gui

      - name: Create universal shuffle_gui binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/shuffle_gui \
            target/x86_64-apple-darwin/release/shuffle_gui \
            -output shuffle_gui-macos-universal

      - name: Package
        run: |
          mkdir -p dist
          cp shuffle-macos-universal     dist/
          cp shuffle_gui-macos-universal dist/
          tar -czf shuffle-macos-universal.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: shuffle-macos-universal.tar.gz

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-macos-universal]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            shuffle-linux-x86_64.tar.gz
            deadpool-*-linux-x86_64.AppImage
            shuffle-windows-x86_64.zip
            deadpool-windows-x86_64-installer.exe
            shuffle-macos-universal.tar.gz
