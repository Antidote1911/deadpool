name: CI / Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  build-linux:
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libfontconfig1-dev \
            wget file curl

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build deadpool-cli
        run: cargo build --release -p deadpool-cli

      - name: Build deadpool (GUI)
        run: cargo build --release -p deadpool

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage appimagetool-x86_64.AppImage

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp packaging/linux/deadpool.desktop \
            AppDir/usr/share/applications/deadpool.desktop
          cp deadpool-gui/resources/icon.png \
            AppDir/usr/share/icons/hicolor/256x256/apps/deadpool.png

          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable target/release/deadpool-cli \
            --executable target/release/deadpool \
            --desktop-file AppDir/usr/share/applications/deadpool.desktop \
            --icon-file deadpool-gui/resources/icon.png

          rm -f AppDir/AppRun
          install -m755 packaging/linux/AppRun AppDir/AppRun

          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage \
            AppDir "deadpool-${VERSION}-linux-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: deadpool-*-linux-x86_64.AppImage

  build-windows:
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: "false"

      - name: Build deadpool-cli
        run: cargo build --release -p deadpool-cli

      - name: Build deadpool (GUI)
        run: cargo build --release -p deadpool

      - name: Package portable zip
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          New-Item -ItemType Directory -Force dist
          Copy-Item target\release\deadpool-cli.exe dist\deadpool-cli.exe
          Copy-Item target\release\deadpool.exe     dist\deadpool.exe
          Compress-Archive -Path dist\* -DestinationPath "deadpool-$version-windows-portable.zip"

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''

          magick "deadpool-gui\resources\icon.png" `
            -define icon:auto-resize="256,128,64,48,32,16" icon.ico

          New-Item -ItemType Directory -Force installer_stage
          Copy-Item target\release\deadpool-cli.exe installer_stage\deadpool-cli.exe
          Copy-Item target\release\deadpool.exe     installer_stage\deadpool.exe
          Copy-Item icon.ico                         installer_stage\icon.ico
          Copy-Item packaging\windows\installer.iss  installer_stage\installer.iss

          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=$version" "/Fdeadpool-$version-win-setup" `
            "/O$env:GITHUB_WORKSPACE" installer_stage\installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            deadpool-*-windows-portable.zip
            deadpool-*-win-setup.exe

  build-macos-universal:
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build deadpool-cli (arm64 + x86_64)
        run: |
          cargo build --release --target aarch64-apple-darwin -p deadpool-cli
          cargo build --release --target x86_64-apple-darwin  -p deadpool-cli

      - name: Create universal deadpool-cli binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/deadpool-cli \
            target/x86_64-apple-darwin/release/deadpool-cli \
            -output deadpool-cli-macos-universal

      - name: Build deadpool GUI (arm64 + x86_64)
        run: |
          cargo build --release --target aarch64-apple-darwin -p deadpool
          cargo build --release --target x86_64-apple-darwin  -p deadpool

      - name: Create universal deadpool binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/deadpool \
            target/x86_64-apple-darwin/release/deadpool \
            -output deadpool-macos-universal

      - name: Package DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp deadpool-cli-macos-universal dist/
          cp deadpool-macos-universal     dist/
          hdiutil create -volname "deadpool-${VERSION}" \
            -srcfolder dist \
            -ov -format UDZO \
            "deadpool-${VERSION}-universal-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: deadpool-*-universal-macos.dmg

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-macos-universal]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            deadpool-*-linux-x86_64.AppImage
            deadpool-*-windows-portable.zip
            deadpool-*-win-setup.exe
            deadpool-*-universal-macos.dmg
